theme:
  name: "material"
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/lightbulb
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/lightbulb-outline
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: white
      accent: white
      toggle:
        icon: material/lightbulb-auto-outline
        name: "Switch to system preference"
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.path
    - navigation.indexes
    - navigation.sections
    - navigation.tracking
    - toc.follow
  # logo: "img/logo-white.svg"
  # TODO(Marcelo): Add a favicon.
  # favicon: "favicon.ico"

# https://www.mkdocs.org/user-guide/configuration/#validation
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.superfences
  # Code examples live as complete, importable, tested files under `docs_src/`
  # and are included into pages with `--8<-- "docs_src/<chapter>/tutorialNNN.py"`
  # (resolved against the repo root regardless of the build's working
  # directory; the extension's default base_path is the CWD).
  # `check_paths: true` + `strict: true` turn a renamed/deleted example into a
  # build failure instead of a silently empty code block.
  - pymdownx.snippets:
      base_path: !relative $config_dir
      check_paths: true
  - pymdownx.tilde
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.extra:
      pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/.overrides/.icons
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - sane_lists # this means you can start a list from any number

watch:
  - src
  - docs_src

hooks:
  - docs/hooks/llms_txt.py

plugins:
  - search
  - social:
      enabled: !ENV [ENABLE_SOCIAL_CARDS, false]
  - glightbox
  - gen-files:
      scripts:
        - docs/hooks/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - redirects:
      redirect_maps:
        advanced/authorization.md: run/authorization.md
        advanced/caching.md: client/caching.md
        advanced/deprecated.md: deprecated.md
        advanced/identity-assertion.md: client/identity-assertion.md
        advanced/multi-round-trip.md: handlers/multi-round-trip.md
        advanced/oauth-clients.md: client/oauth-clients.md
        advanced/opentelemetry.md: run/opentelemetry.md
        advanced/session-groups.md: client/session-groups.md
        advanced/subscriptions.md: handlers/subscriptions.md
        advanced/uri-templates.md: servers/uri-templates.md
        client/protocol-versions.md: protocol-versions.md
        installation.md: get-started/installation.md
        tutorial/completions.md: servers/completions.md
        tutorial/context.md: handlers/context.md
        tutorial/dependencies.md: handlers/dependencies.md
        tutorial/elicitation.md: handlers/elicitation.md
        tutorial/first-steps.md: get-started/first-steps.md
        tutorial/handling-errors.md: servers/handling-errors.md
        tutorial/index.md: get-started/index.md
        tutorial/lifespan.md: handlers/lifespan.md
        tutorial/logging.md: handlers/logging.md
        tutorial/media.md: servers/media.md
        tutorial/progress.md: handlers/progress.md
        tutorial/prompts.md: servers/prompts.md
        tutorial/resources.md: servers/resources.md
        tutorial/structured-output.md: servers/structured-output.md
        tutorial/testing.md: get-started/testing.md
        tutorial/tools.md: servers/tools.md
  - mkdocstrings:
      handlers:
        python:
          paths: [src, src/mcp-types]
          options:
            relative_crossrefs: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            group_by_category: false
          inventories:
            - url: https://docs.python.org/3/objects.inv
            - url: https://docs.pydantic.dev/latest/objects.inv
            - url: https://typing-extensions.readthedocs.io/en/latest/objects.inv
