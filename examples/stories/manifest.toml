# examples/stories/manifest.toml
#
# Drives tests/examples/ axis expansion. test_manifest_matches_filesystem
# asserts [story.*] keys == story dirs with a client.py.

[defaults]
transports    = ["in-memory", "http-asgi"]   # in-memory = Client(server); http-asgi = StreamingASGITransport
era           = "dual"                       # "dual" | "modern" | "legacy" | "dual-in-body"
lowlevel      = true                         # also run scenario against server_lowlevel.build_server()/build_app()
server_export = "factory"                    # "factory" -> build_server() | "app" -> build_app()
needs_connect = false                        # scenario(client) vs scenario(client, connect)
needs_http    = false                        # scenario(..., http) gets the raw httpx.AsyncClient (http-asgi only)
timeout_s     = 30
smoke         = false
mcp_path      = "/mcp"
xfail         = []                           # ["<transport>:<era>", ...] -> strict xfail on that leg
env           = {}                           # env vars set for the leg via monkeypatch

# ───────────────────────────── start here ─────────────────────────────

[story.tools]
smoke = true

[story.prompts]

[story.resources]

[story.lifespan]

[story.dual_era]
era           = "dual-in-body"
needs_connect = true

[story.custom_version]
era = "legacy"

[story.streaming]
# progress + log notifications dropped on the modern streamable-HTTP path pending SSE wiring
xfail = ["http-asgi:modern"]

[story.elicitation]
era = "legacy"

[story.sampling]
era = "legacy"

[story.stickynotes]

[story.custom_methods]
lowlevel = false

[story.schema_validators]

[story.middleware]

[story.parallel_calls]
# modern single-exchange dispatch context no-ops notify() over streamable-http
xfail = ["http-asgi:modern"]

[story.roots]
era = "legacy"

[story.pagination]

[story.error_handling]

[story.client_session]
lowlevel = false

[story.serve_one]
transports = ["in-memory"]

[story.stateless_legacy]
transports    = ["http-asgi"]
server_export = "app"
era           = "dual-in-body"
needs_connect = true
smoke         = true

[story.json_response]
transports    = ["http-asgi"]
server_export = "app"
era           = "modern"
needs_http    = true

[story.legacy_routing]
transports    = ["http-asgi"]
server_export = "app"
era           = "dual-in-body"
needs_connect = true

[story.starlette_mount]
transports    = ["http-asgi"]
server_export = "app"
lowlevel      = false
mcp_path      = "/api/"

[story.sse_polling]
transports    = ["http-asgi"]
server_export = "app"
era           = "legacy"
timeout_s     = 20
# event_store.py is local; example-grade only (sequential IDs, no eviction).

[story.standalone_get]
transports    = ["http-asgi"]
era           = "legacy"

[story.reconnect]
transports    = ["http-asgi"]
era           = "modern"
needs_connect = true

[story.bearer_auth]
transports    = ["http-asgi"]
server_export = "app"

[story.oauth]
transports    = ["http-asgi"]
server_export = "app"
needs_connect = true
env           = { OAUTH_DEMO_AUTO_CONSENT = "1" }

[story.oauth_client_credentials]
transports    = ["http-asgi"]
server_export = "app"

# ───────────────────────────── deferred ─────────────────────────────
# README-only placeholders; no client.py, not expanded into legs.
# test_manifest_matches_filesystem checks these match the README-only dirs.

[deferred]
caching       = "client honouring + per-result override unlanded"
mrtr          = "#2898 — InputRequiredResult runtime"
subscriptions = "#2901 — Client.listen / ServerEventBus"
tasks         = "extensions capability map + tasks runtime"
apps          = "#2896 — extensions capability map"
skills        = "#2896 — SEP-2640"
events        = "#2901 + #2896"
