name: Deploy Docs

on:
  push:
    branches:
      - main
      - v1.x
    paths:
      - docs/**
      # docs pages include their code blocks from these files via `--8<--`, so a
      # change here changes the rendered site even when no .md file moves.
      - docs_src/**
      - mkdocs.yml
      - src/mcp/**
      - src/mcp-types/**
      - scripts/build-docs.sh
      - scripts/docs/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: 0.9.5

      - name: Build combined docs (v1.x at /, main at /v2/)
        run: bash scripts/build-docs.sh site

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
