version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 14
    groups:
      python-packages:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 14
    groups:
      github-actions:
        patterns:
          - "*"
